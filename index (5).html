<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Mamute Runner Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0b1220}
body{display:flex;justify-content:center;align-items:flex-start;padding:10px;background:radial-gradient(900px 500px at 50% 0%, #1b2f4a 0%, #0b1220 70%, #070a14 100%);font-family:system-ui,-apple-system,Segoe UI,Roboto;color:#e2e8f0;overflow:hidden}
#wrap{width:min(920px,100vw)}
canvas#game{width:100%!important;height:360px!important;display:block;border-radius:18px;border:2px solid rgba(56,189,248,.45);background:linear-gradient(180deg,#7fb2de 0%, #4a6d94 100%);box-shadow:0 0 0 1px rgba(0,0,0,.6), 0 12px 32px rgba(0,0,0,.45)}
#top{display:flex;justify-content:space-between;align-items:center;margin:10px 2px 8px}
#badge{font-size:11px;font-weight:800;letter-spacing:.06em;padding:6px 10px;border-radius:999px;background:#38bdf8;color:#082f49}
#score{font:700 12px ui-monospace,monospace;color:#cbd5e1}
#bar{height:5px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;margin:0 2px 10px;border:1px solid rgba(255,255,255,.12)}
#fill{height:100%;width:0%;background:linear-gradient(90deg,#38bdf8,#a78bfa);transition:width .35s}
#hint{font-size:11px;opacity:.7;text-align:center;margin:6px 0 10px}
.btns{display:flex;gap:8px}
.btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.10);color:#e2e8f0;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700}
#touch{display:flex;gap:10px;margin-top:10px}
#touch button{flex:1;height:64px;border-radius:14px;border:1px solid rgba(56,189,248,.28);background:rgba(15,23,42,.85);color:#e0f2fe;font-weight:900;font-size:16px;letter-spacing:.02em;backdrop-filter:blur(6px)}
#touch button:active{transform:scale(.98);background:#1e3a5f}
@media(min-width:721px){#touch{display:none} #hint{display:block}}
</style>
</head>
<body>
<div id="wrap">
<div id="top"><span id="badge">FASE 1 • DESPERTAR</span><span id="score">HI 0000  0000</span></div>
<div id="bar"><div id="fill"></div></div>
<canvas id="game" width="920" height="360"></canvas>
<div id="hint">Toque / Espaço = pular • Segura ↓ = abaixar • Evolui a cada fase</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
<div class="btns"><button class="btn" id="muteBtn">🔊</button><button class="btn" id="restartBtn">↻</button></div>
<div style="font-size:11px;opacity:.6" id="phaseSub">Cartoon Rush</div>
</div>
<div id="touch"><button id="duckBtn">⬇ ABAIXAR</button><button id="jumpBtn">⬆ PULAR</button></div>
</div>

  {name:"FASE 3 • ERA DO GELO", sub:"Alfa Nevado", top:"#15203a", bot:"#0a1222", ground:"#1b2a4a", speed:7.4, emoji:["🧊","🥶","🌬️","🔥","🦣"]},
  {name:"FASE 4 • APOCALIPSE", sub:"Mamute Lendário", top:"#0b1122", bot:"#050914", ground:"#142040", speed:8.7, emoji:["☄️","💨","🧊","⚡","🔥"]}
];
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let W=920,H=360,dpr=1;
function resize(){
  const r=canvas.getBoundingClientRect();
  const cw=Math.max(320,Math.round(r.width||920));
  dpr=Math.min(2,window.devicePixelRatio||1);
  W=cw; H=360;
  canvas.width=Math.floor(W*dpr);
  canvas.height=Math.floor(H*dpr);
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize(); window.addEventListener('resize',resize);

let imgs=[]; let imgsReady=[false,false,false,false];
SPRITE_SRC.forEach((src,i)=>{
  const im=new Image();
  im.onload=()=>{imgsReady[i]=true;};
  im.onerror=()=>{imgsReady[i]=false;};
  im.src=src;
  imgs[i]=im;
});

let muted=false, actx=null;
function getAC(){ if(muted) return null; if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); return actx;}
function beep(k){ try{ const a=getAC(); if(!a) return; const o=a.createOscillator(), g=a.createGain(); o.connect(g); g.connect(a.destination); const t=a.currentTime; if(k==='jump'){o.type='square';o.frequency.setValueAtTime(190,t);o.frequency.exponentialRampToValueAtTime(460,t+.11);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);} else if(k==='hit'){o.type='sawtooth';o.frequency.setValueAtTime(140,t);o.frequency.linearRampToValueAtTime(32,t+.28);g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.32);} else if(k==='phase'){o.type='sine';o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(900,t+.28);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);} else {o.type='sine';o.frequency.setValueAtTime(720,t);o.frequency.setValueAtTime(1000,t+.06);g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);} o.start(); o.stop(t+.38);}catch(e){} }

const state={score:0,high:0,lives:3,over:false,paused:false,invul:0,frame:0,next:72,shake:0,phase:0,phaseTimer:0};
try{state.high=parseInt(localStorage.getItem('mamuteHighChat')||'0')||0}catch(e){}
const player={x:70,y:0,w:88,h:62,duckH:36,vy:0,g:0.80,jump:-14.8,onGround:true,ducking:false,bob:0};
let obstacles=[],snow=[],clouds=[],parts=[];
for(let i=0;i<5;i++) clouds.push({x:Math.random()*W,y:18+Math.random()*60,s:0.2+Math.random()*0.5,w:68+Math.random()*56});
for(let i=0;i<22;i++) snow.push({x:Math.random()*920,y:Math.random()*360,v:0.7+Math.random()*1.6});

function curPhase(){ return PHASES[state.phase]; }
function phaseByScore(s){ if(s<12) return 0; if(s<28) return 1; if(s<52) return 2; return 3; }
function setUI(){ const ph=curPhase(); document.getElementById('badge').textContent=ph.name; document.getElementById('phaseSub').textContent=ph.sub; const nxt=[12,28,52,999][state.phase]; const prev=[0,12,28,52][state.phase]; const pct=Math.max(0,Math.min(100, (state.score-prev)/(nxt-prev)*100)); document.getElementById('fill').style.width=pct+'%'; document.getElementById('score').textContent='HI '+String(state.high).padStart(4,'0')+'  '+String(state.score).padStart(4,'0'); }
function reset(){ state.score=0; state.lives=3; state.over=false; state.paused=false; state.invul=0; state.frame=0; state.next=70; state.shake=0; state.phase=0; state.phaseTimer=0; obstacles=[]; parts=[]; player.vy=0; player.h=62; player.y=H-player.h-16; player.onGround=true; player.ducking=false; setUI(); }
function spawn(){ const ph=curPhase(); const isFly=Math.random()<0.32 && state.phase>0; const list=ph.emoji; const em=list[Math.floor(Math.random()*list.length)]; const sz=isFly?38+Math.random()*10:44+Math.random()*16; const y=isFly?H-112-Math.random()*18:H-sz-16; obstacles.push({x:W+28,y,w:sz,h:sz,emoji:em}); state.next=56+Math.random()*70 - ph.speed*1.5; }
function puff(x,y,n,c){ for(let i=0;i<n;i++) parts.push({x,y,vx:Math.random()*-2.8-0.2,vy:Math.random()*-2.6-0.4,life:12+Math.random()*9,r:1.7+Math.random()*2.3,c:c||'#7dd3fc'}); }

function update(dt){
  const prevPhase=state.phase;
  const np=phaseByScore(state.score);
  if(np!==state.phase){ state.phase=np; state.phaseTimer=84; beep('phase'); puff(player.x+player.w/2, player.y+player.h/2, 16, '#38bdf8'); setUI(); }
  if(state.over||state.paused) return;
  state.frame++; if(state.invul>0) state.invul--; if(state.shake>0) state.shake--; if(state.phaseTimer>0) state.phaseTimer--;
  player.bob+=dt*0.23;
  player.vy+=player.g*dt; player.y+=player.vy*dt;
  const th=player.ducking?player.duckH:62; player.h+=(th-player.h)*0.32;
  const ground=H-player.h-16;
  if(player.y>=ground){ if(!player.onGround) puff(player.x+player.w*0.5,H-18,7, curPhase().ground); player.y=ground; player.vy=0; player.onGround=true; } else player.onGround=false;
  for(let c of clouds){ c.x-=c.s*curPhase().speed*0.22*dt; if(c.x<-130){c.x=W+20; c.y=16+Math.random()*62;}}
  for(let s of snow){ s.y+=s.v*dt; s.x+=Math.sin(state.frame*0.01+s.y*0.02)*0.35; if(s.y>H){s.y=-10; s.x=Math.random()*W;}}
  if(state.frame>state.next){ spawn(); state.frame=0; }
  for(let i=obstacles.length-1;i>=0;i--){ let o=obstacles[i]; o.x-=curPhase().speed*dt; const pad=9; const hit=state.invul===0 && player.x+pad<o.x+o.w-pad && player.x+player.w-pad>o.x+pad && player.y+8<o.y+o.h-4 && player.y+player.h-7>o.y+4;
    if(hit){ state.lives--; state.invul=84; state.shake=12; beep('hit'); puff(o.x+o.w*0.5,o.y+o.h*0.5,10,'#fb7185'); obstacles.splice(i,1); if(state.lives<=0){ state.over=true; if(state.score>state.high){state.high=state.score; try{localStorage.setItem('mamuteHighChat',state.high)}catch(e){}} setUI(); } continue; }
    if(o.x+o.w<-30){ obstacles.splice(i,1); state.score++; beep('score'); setUI(); if(state.score%6===0) curPhase().speed=Math.min(12.5, curPhase().speed+0.35); }
  }
  for(let i=parts.length-1;i>=0;i--){ let p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.16; p.life--; if(p.life<=0) parts.splice(i,1); }
}

function draw(){
  const ph=curPhase();
  ctx.save();
  if(state.shake>0) ctx.translate((Math.random()-0.5)*state.shake*0.9,(Math.random()-0.5)*state.shake*0.45);
  // FUNDO NUNCA BRANCO - sempre azulado escuro medio para contraste no chat claro/escuro
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,ph.top); g.addColorStop(1,ph.bot);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // vinheta para destacar centro
  const vign=ctx.createRadialGradient(W/2,H/2, H*0.3, W/2,H/2, W*0.9);
  vign.addColorStop(0,"rgba(0,0,0,0)"); vign.addColorStop(1,"rgba(0,0,0,0.32)");
  ctx.fillStyle=vign; ctx.fillRect(0,0,W,H);
  if(state.phase>=2){ ctx.fillStyle='rgba(56,189,248,0.10)'; ctx.beginPath(); ctx.ellipse(W*0.72,56,W*0.55,76,-0.18,0,Math.PI*2); ctx.fill(); }
  // nuvens claras com borda para aparecer
  ctx.fillStyle='rgba(255,255,255,0.92)'; for(let c of clouds){ ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w*0.5,11,0,0,Math.PI*2); ctx.ellipse(c.x+16,c.y+4,c.w*0.33,8,0,0,Math.PI*2); ctx.fill(); }
  // neve
  if(state.phase>0){ ctx.fillStyle='rgba(186,230,253,0.95)'; for(let s of snow){ ctx.beginPath(); ctx.arc(s.x,s.y,1.6,0,Math.PI*2); ctx.fill(); } }
  // chao
  ctx.fillStyle=ph.ground; ctx.fillRect(0,H-16,W,16);
  ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(0,H-16,W,2);
  ctx.strokeStyle='rgba(255,255,255,0.22)'; ctx.setLineDash([12,12]); ctx.lineDashOffset=-(state.frame*ph.speed*0.7)%24; ctx.beginPath(); ctx.moveTo(0,H-8); ctx.lineTo(W,H-8); ctx.stroke(); ctx.setLineDash([]);
  // sombra
  ctx.fillStyle='rgba(0,0,0,0.32)'; ctx.beginPath(); ctx.ellipse(player.x+player.w*0.45,H-9,player.w*0.38,5.2,0,0,Math.PI*2); ctx.fill();
  // MAMUTE - desenha imagem se pronta, senao emoji grande
  const bob=Math.sin(player.bob)*(player.onGround?(player.ducking?1:2.4):0);
  const dy=player.y+bob;
  const im=imgs[state.phase];
  const ready=imgsReady[state.phase] && im && im.complete && im.naturalWidth>0;
  if(ready){
    if(state.invul===0 || Math.floor(state.invul/5)%2===0){
      const iw=im.naturalWidth, ih=im.naturalHeight;
      const tw=player.w+18; const th=tw*ih/iw;
      const dh=player.ducking?Math.min(th, player.duckH+12):th;
      ctx.drawImage(im, player.x-6, dy+player.h-dh+4, tw, dh);
    } else {
      ctx.globalAlpha=0.42; ctx.drawImage(im, player.x-6, dy, player.w+18, player.h+6); ctx.globalAlpha=1;
    }
  } else {
    // fallback visivel - emoji grande com contorno
    ctx.font=(player.h+6)+'px Apple Color Emoji,Segoe UI Emoji,system-ui'; ctx.textBaseline='top';
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillText('🦣', player.x+2, dy+4);
    ctx.fillStyle='#fff'; ctx.fillText('🦣', player.x, dy);
  }
  // obstaculos com fundo para contraste
  for(let o of obstacles){
    ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.roundRect(o.x-6,o.y-4,o.w+12,o.h+10,10); ctx.fill();
    ctx.font=o.h+'px Apple Color Emoji,Segoe UI Emoji,system-ui'; ctx.textBaseline='top'; ctx.fillStyle='#e8eef8'; ctx.fillText(o.emoji,o.x,o.y);
  }
  for(let p of parts){ ctx.globalAlpha=Math.max(0,p.life/14); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1;
  // HUD com contorno preto para legibilidade
  ctx.textAlign='left'; ctx.font='900 15px system-ui'; ctx.lineWidth=3; ctx.strokeStyle='rgba(0,0,0,0.7)'; ctx.fillStyle='#fff'; const hearts='❤️'.repeat(Math.max(0,state.lives)); ctx.strokeText(hearts,12,14); ctx.fillText(hearts,12,14);
  if(state.phaseTimer>0){ const a=Math.min(1,state.phaseTimer/20); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='900 22px system-ui'; ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.lineWidth=4; ctx.strokeText(PHASES[state.phase].name,W/2,56); ctx.fillStyle='#7dd3fc'; ctx.fillText(PHASES[state.phase].name,W/2,56); ctx.globalAlpha=1; }
  if(state.over){ ctx.fillStyle='rgba(7,11,20,0.72)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='900 32px system-ui'; ctx.fillText('GAME OVER',W/2,H/2-10); ctx.font='600 13px system-ui'; ctx.fillStyle='#94a3b8'; ctx.fillText('Toque PULAR ou Espaço para reiniciar',W/2,H/2+20); }
  if(state.paused && !state.over){ ctx.fillStyle='rgba(15,23,42,0.78)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#e2e8f0'; ctx.textAlign='center'; ctx.font='900 24px system-ui'; ctx.fillText('PAUSADO',W/2,H/2); }
  ctx.restore();
}
let last=0;
function loop(t){ const dt=Math.min(32,t-last)/16.66; last=t; update(isFinite(dt)&&dt>0?dt:1); draw(); requestAnimationFrame(loop); }
reset();
requestAnimationFrame(loop);

function doJump(){ if(state.over){reset();return;} if(state.paused){state.paused=false;return;} if(player.onGround && !player.ducking){ player.vy=player.jump; player.onGround=false; beep('jump'); } }
function setDuck(v){ if(state.over) return; player.ducking=v; }
addEventListener('keydown',e=>{ if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();doJump();} if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();setDuck(true);} if(e.code==='KeyP') state.paused=!state.paused; });
addEventListener('keyup',e=>{ if(e.code==='ArrowDown'||e.code==='KeyS') setDuck(false); });
document.getElementById('jumpBtn').addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});
document.getElementById('duckBtn').addEventListener('touchstart',e=>{e.preventDefault();setDuck(true);},{passive:false});
document.getElementById('duckBtn').addEventListener('touchend',e=>{e.preventDefault();setDuck(false);});
document.getElementById('duckBtn').addEventListener('mousedown',()=>setDuck(true));
document.getElementById('duckBtn').addEventListener('mouseup',()=>setDuck(false));
document.getElementById('jumpBtn').addEventListener('mousedown',doJump);
canvas.addEventListener('mousedown',doJump);
document.getElementById('restartBtn').onclick=reset;
document.getElementById('muteBtn').onclick=function(){muted=!muted;this.textContent=muted?'🔇':'🔊'; if(!muted) beep('score');};
</script>
</body>
